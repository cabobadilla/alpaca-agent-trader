version: "3.9"

# ============================================================
# Alpaca Agent Trader — Docker Compose
# ALPC-001: Multi-Service Local Environment Bootstrap
# ============================================================

networks:
  alpaca-net:
    driver: bridge

volumes:
  strategies-data:
  tradeplan-data:
  approval-data:

services:

  # ----------------------------------------------------------
  # agent-a: Claude Sonnet research agent (Monday 6am EST)
  # ----------------------------------------------------------
  agent-a:
    build:
      context: ./agent-a
      dockerfile: Dockerfile
    container_name: agent-a
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_A_CRON=${AGENT_A_CRON:-0 6 * * 1}
      - STRATEGIES_DIR=${STRATEGIES_DIR:-/data/strategies}
    volumes:
      - strategies-data:/data/strategies
    networks:
      - alpaca-net
    # No host port mapping — internal only

  # ----------------------------------------------------------
  # agent-b: GPT-4o-mini research agent (Monday 6am EST)
  # ----------------------------------------------------------
  agent-b:
    build:
      context: ./agent-b
      dockerfile: Dockerfile
    container_name: agent-b
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENT_B_CRON=${AGENT_B_CRON:-0 6 * * 1}
      - STRATEGIES_DIR=${STRATEGIES_DIR:-/data/strategies}
    volumes:
      - strategies-data:/data/strategies
    networks:
      - alpaca-net
    # No host port mapping — internal only

  # ----------------------------------------------------------
  # agent-c: Execution agent (Mon-Fri 9am EST)
  # ----------------------------------------------------------
  agent-c:
    build:
      context: ./agent-c
      dockerfile: Dockerfile
    container_name: agent-c
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_C_CRON=${AGENT_C_CRON:-0 9 * * 1-5}
      - STRATEGIES_DIR=${STRATEGIES_DIR:-/data/strategies}
      - TRADEPLANS_DIR=${TRADEPLANS_DIR:-/data/tradeplans}
      - APPROVALS_DIR=${APPROVALS_DIR:-/data/approvals}
      - MYALPACA_BASE_URL=${MYALPACA_BASE_URL:-http://myalpaca-backend:3001}
      - APPROVAL_BRIDGE_URL=${APPROVAL_BRIDGE_URL:-http://approval-bridge:8080}
      - APPROVAL_TIMEOUT_MINUTES=${APPROVAL_TIMEOUT_MINUTES:-120}
    volumes:
      - strategies-data:/data/strategies
      - tradeplan-data:/data/tradeplans
      - approval-data:/data/approvals
    networks:
      - alpaca-net
    depends_on:
      approval-bridge:
        condition: service_healthy
    # No host port mapping — internal only

  # ----------------------------------------------------------
  # approval-bridge: FastAPI approval gateway (port 8080)
  # ----------------------------------------------------------
  approval-bridge:
    build:
      context: ./approval-bridge
      dockerfile: Dockerfile
    container_name: approval-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - RESEND_TO_EMAIL=${RESEND_TO_EMAIL}
      - TRADEPLANS_DIR=${TRADEPLANS_DIR:-/data/tradeplans}
      - APPROVALS_DIR=${APPROVALS_DIR:-/data/approvals}
    volumes:
      - tradeplan-data:/data/tradeplans
      - approval-data:/data/approvals
    # No host port — accessed internally via myalpaca-backend proxy
    networks:
      - alpaca-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # myalpaca-backend: Node.js Express API (port 3001)
  # Alpaca connector + approval proxy
  # ----------------------------------------------------------
  myalpaca-backend:
    build:
      context: ./myalpaca/backend
      dockerfile: Dockerfile
    container_name: myalpaca-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TZ:-America/New_York}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      - APPROVAL_BRIDGE_URL=${APPROVAL_BRIDGE_URL:-http://approval-bridge:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - AGENT_A_CRON=${AGENT_A_CRON:-0 6 * * 1}
      - AGENT_B_CRON=${AGENT_B_CRON:-0 6 * * 1}
      - AGENT_C_CRON=${AGENT_C_CRON:-0 9 * * 1-5}
      - STRATEGIES_DIR=${STRATEGIES_DIR:-/data/strategies}
      - TRADEPLANS_DIR=${TRADEPLANS_DIR:-/data/tradeplans}
      - APPROVALS_DIR=${APPROVALS_DIR:-/data/approvals}
    volumes:
      - strategies-data:/data/strategies:ro
      - tradeplan-data:/data/tradeplans:ro
      - approval-data:/data/approvals:ro
    ports:
      - "3001:3001"
    networks:
      - alpaca-net
    depends_on:
      approval-bridge:
        condition: service_healthy

  # ----------------------------------------------------------
  # myalpaca-frontend: React/Vite dev server (port 5173)
  # ----------------------------------------------------------
  myalpaca-frontend:
    build:
      context: ./myalpaca/frontend
      dockerfile: Dockerfile
    container_name: myalpaca-frontend
    restart: unless-stopped
    environment:
      - VITE_API_TARGET=http://myalpaca-backend:3001
    ports:
      - "5173:5173"
    networks:
      - alpaca-net
    depends_on:
      - myalpaca-backend
