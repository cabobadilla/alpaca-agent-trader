services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ./backend/src:/app/src  # hot reload in dev
      - ./logs:/app/logs        # persist trade log on host
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped
